<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome · OpenClaw and Christopher Experiment</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #111;
        background: #fff;
      }

      main {
        width: min(42rem, calc(100vw - 2rem));
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 1.05;
        font-weight: 760;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to the OpenClaw and Christopher experiment.</h1>
    </main>
  </body>
</html>
