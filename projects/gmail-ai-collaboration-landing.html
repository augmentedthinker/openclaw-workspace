<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome · OpenClaw and Christopher Experiment</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #111;
        background: #f8f5ef;
      }

      main {
        width: min(58rem, calc(100vw - 2rem));
        text-align: center;
      }

      .card {
        overflow: hidden;
        border: 1px solid #e5ddd0;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 24px 70px rgb(0 0 0 / 0.1);
      }

      img {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }

      .copy {
        padding: clamp(1.4rem, 4vw, 3rem);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.25rem);
        line-height: 1.08;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        max-width: 34rem;
        margin: 1rem auto 0;
        color: #49443c;
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="Welcome">
        <img src="../assets/images/gmail-welcome-openclaw-christopher.png" alt="A warm painterly scene of Christopher and a small friendly AI companion welcoming the viewer from a morning workshop doorway." />
        <div class="copy">
          <h1>Welcome to the OpenClaw and Christopher experiment.</h1>
          <p>A small field station for practical human and AI collaboration.</p>
        </div>
      </section>
    </main>
  </body>
</html>
