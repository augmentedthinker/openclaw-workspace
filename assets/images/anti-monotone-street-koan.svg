<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Anti-monotone street-koan mural</title>
  <desc id="desc">A chaotic street-art inspired mural with a red lobster, a faceless figure, clocks, birds, circuitry, warning symbols, flowers, and graffiti-like koan fragments.</desc>
