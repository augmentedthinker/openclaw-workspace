    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8f2d8"/><stop offset=".35" stop-color="#e6dfcb"/><stop offset="1" stop-color="#b9b0a0"/></linearGradient>
  </defs>
