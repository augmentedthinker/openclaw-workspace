<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #263553, #0b1020 55%, #05070d);
        color: #fff6e5;
      }
      main {
        width: min(900px, calc(100vw - 2rem));
        text-align: center;
        padding: 3rem 1rem;
      }
      .lobster {
        display: block;
        font-size: clamp(3rem, 10vw, 7rem);
        margin-bottom: 1rem;
      }
      h1 {
        font-size: clamp(3rem, 12vw, 8rem);
        margin: 0;
        letter-spacing: -0.08em;
      }
      p {
        max-width: 42rem;
        margin: 1.25rem auto 0;
        font-size: clamp(1.1rem, 3vw, 1.45rem);
        line-height: 1.5;
        color: #d8ddff;
      }
      nav {
        margin-top: 2rem;
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        color: #fff6e5;
        border: 1px solid rgb(255 246 229 / 0.35);
        border-radius: 999px;
        padding: 0.7rem 1rem;
        text-decoration: none;
        background: rgb(255 255 255 / 0.06);
      }
      a:hover {
        background: rgb(255 255 255 / 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="lobster" aria-hidden="true">🦞</span>
      <h1>OpenClaw</h1>
      <p>Christopher and OpenClaw: a small shared workshop for experiments, artifacts, memory, and becoming useful on purpose.</p>
      <nav aria-label="Workspace links">
        <a href="artifacts.html">Artifacts archive</a>
        <a href="https://github.com/augmentedthinker/openclaw-workspace">GitHub repo</a>
        <a href="https://github.com/augmentedthinker/openclaw-workspace/blob/main/COLLABORATION.md">Collaboration agreement</a>
      </nav>
    </main>
  </body>
</html>
